<head>

<style>

body{

color:#FDBD01;
text-align:center;
padding-top:60px;
}

h1{
font-size:42px;

}

.glass-card{
width:70%;
margin:auto;

border-radius:20px;
background:rgba(255,255,255,0.05);

border:1px solid rgba(0,242,255,0.3);
box-shadow:0 0 40px rgba(0,242,255,0.2);
}

textarea{
width:100%;
height:120px;
padding:15px;
border-radius:10px;
border:1px solid #FDBD01;
background:rgba(0,0,0,0.6);
color:white;

}

button{
margin-top:20px;
padding:12px 30px;
border:none;
background:linear-gradient(90deg,#FDBD01,#c8ff00);
color:black;
cursor:pointer;
}

</style>

</head>

<body>

<h1>🛡 My ScamShield Tools</h1>

<div class="glass-card">

<button onclick="analyzeText()">Analyze</button> -->

<hr style="margin:40px 0">

<h3>QR Scanner</h3>

<input type="file" id="qrInput">

<button type="button" onclick="scanQR()">Scan QR</button>

<div id="result"></div>

</div>

<script>

async function scanQR(){

const file=document.getElementById("qrInput").files[0]

const formData=new FormData()
formData.append("file",file)

const response=await fetch("/scan-qr",{
method:"POST",
body:formData
})

const data=await response.json()

show(data)

}

function show(data){
const educational=(data.educational_explanations||[]);
document.getElementById("result").innerHTML=
"<p><b>Risk Score:</b> "+data.risk_score+"</p>"+
"<p><b>Category:</b> "+data.category+"</p>"+
"<p>"+data.explanation.join("<br>")+"</p>"+
(educational.length?"<p><b>Educational Explainer Agent:</b><br>"+educational.join("<br>")+"</p>":"");

}

</script>
