<!DOCTYPE html>
<html>

<head>
<title>ScamShield AI Tools</title>

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:radial-gradient(circle at top left,#0f2027,#000000 70%);
color:#FDBD01;
text-align:center;
padding-top:60px;
}

h1{
font-size:42px;
text-shadow:0 0 15px #FDBD01;
}

.glass-card{
width:70%;
margin:auto;
padding:40px;
border-radius:20px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(20px);
border:1px solid rgba(0,242,255,0.3);
box-shadow:0 0 40px rgba(0,242,255,0.2);
}

textarea{
width:100%;
height:120px;
padding:15px;
border-radius:10px;
border:1px solid #FDBD01;
background:rgba(0,0,0,0.6);
color:white;
font-size:16px;
resize:none;
}

input{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid cyan;
background:black;
color:white;
margin-top:10px;
}

button{
margin-top:20px;
padding:12px 30px;
font-size:16px;
border-radius:8px;
border:none;
background:linear-gradient(90deg,#FDBD01,#0072ff);
color:black;
cursor:pointer;
font-weight:bold;
}

.meter-container{
width:100%;
margin:25px 0;
background:rgba(255,255,255,0.1);
border-radius:20px;
overflow:hidden;
}

.meter-bar{
height:25px;
width:0%;
background:green;
transition:0.6s;
}

#result{
margin-top:20px;
color:white;
}

</style>
</head>

<body>

<h1>🛡 ScamShield AI Tools</h1>

<div class="glass-card">

<h3>💬 Text Scam Analyzer</h3>

<textarea id="textInput" placeholder="Paste suspicious message"></textarea>

<button onclick="analyzeText()">Analyze</button>

<hr style="margin:40px 0;border:1px solid #FDBD01">

<h2>📷 QR Scanner</h2>
<form method="POST" action="/scan-qr"></form>
<input type="file" id="qrInput">

<button onclick="scanQR()">Scan QR</button>
</form>

<div class="meter-container">
<div class="meter-bar" id="riskBar"></div>
</div>

<div id="result"></div>

</div>

<script>

async function analyzeText(){

const text=document.getElementById("textInput").value;

const response=await fetch("http://localhost:8001/analyze-text",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({text:text})

});

const data=await response.json();

updateRisk(data);

}

async function scanQR(){

const file=document.getElementById("qrInput").files[0];

const formData=new FormData();
formData.append("file",file);

const response=await fetch("http://localhost:8002/scan-qr",{

method:"POST",
body:formData

});

const data=await response.json();

updateRisk(data);

}

function updateRisk(data){

const risk=data.risk_score*100;

const bar=document.getElementById("riskBar");

bar.style.width=risk+"%";

if(risk<40) bar.style.background="green";
else if(risk<70) bar.style.background="orange";
else bar.style.background="red";

document.getElementById("result").innerHTML=
"<p><b>Risk Score:</b> "+data.risk_score+"</p>"+
"<p><b>Category:</b> "+data.category+"</p>"+
"<p>"+data.explanation.join("<br>")+"</p>";

}

</script>

</body>
</html>
